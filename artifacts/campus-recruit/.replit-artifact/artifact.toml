kind = "web"
previewPath = "/"
title = "Campus Recruitment Platform"
version = "1.0.0"
id = "artifacts/campus-recruit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23309

[services.development]
run = "pnpm --filter @workspace/campus-recruit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-recruit", "run", "build" ]
publicDir = "artifacts/campus-recruit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23309"
BASE_PATH = "/"
